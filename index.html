<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi Modern</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-white">

    <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl w-full max-w-md text-center border border-slate-700">
        <h1 class="text-2xl font-bold tracking-wide mb-1 text-blue-400">SISTEM ABSENSI QR</h1>
        <p class="text-xs text-slate-400 mb-6">Atur pilihan opsi status sebelum scanning</p>

        <div class="mb-4 text-left">
            <label class="text-xs font-semibold text-slate-400 block mb-2">PILIH SHIFT / STATUS HARI INI:</label>
            <select id="shift" onchange="cekOpsiKhusus(this.value)" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 text-white font-medium focus:outline-none focus:border-blue-500">
                <option value="Shift 1">Shift 1 (Pagi)</option>
                <option value="Shift 2">Shift 2 (Siang)</option>
                <option value="Shift 3">Shift 3 (Malam)</option>
                <option value="Libur">-- HARI LIBUR --</option>
                <option value="Sakit">-- SAKIT --</option>
                <option value="Izin">-- IZIN --</option>
                <option value="Alfa">-- ALFA (TIDAK HADIR) --</option>
            </select>
        </div>

        <div id="container-tombol" class="flex gap-4 mb-6">
            <button id="btn-masuk" onclick="setStatus('Masuk')" class="flex-1 p-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all border-2 border-blue-400 shadow-lg shadow-blue-600/30 text-white">
                MASUK
            </button>
            <button id="btn-pulang" onclick="setStatus('Pulang')" class="flex-1 p-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-all border-2 border-transparent text-slate-300">
                PULANG
            </button>
        </div>

        <div class="overflow-hidden rounded-2xl bg-black border-2 border-slate-700 relative">
            <div id="reader" class="w-full"></div>
        </div>

        <div id="result" class="mt-5 p-4 rounded-xl text-sm font-semibold hidden transition-all"></div>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const WEB_APP_URL = "URL_GOOGLE_APPS_SCRIPT_ANDA_DI_SINI"; 

        let currentStatus = "Masuk";
        let html5QrcodeScanner;

        // Memantau jika dipilih opsi khusus
        function cekOpsiKhusus(nilai) {
            const containerTombol = document.getElementById('container-tombol');
            const listKhusus = ["Libur", "Sakit", "Izin", "Alfa"];
            
            if (listKhusus.includes(nilai)) {
                containerTombol.classList.add('hidden'); // Sembunyikan tombol Masuk/Pulang
                currentStatus = nilai; // Set status langsung sesuai pilihan dropdown
            } else {
                containerTombol.classList.remove('hidden'); // Munculkan kembali tombol
                currentStatus = "Masuk"; 
                setStatus('Masuk');
            }
        }

        function setStatus(status) {
            currentStatus = status;
            const btnMasuk = document.getElementById('btn-masuk');
            const btnPulang = document.getElementById('btn-pulang');
            
            if(status === "Masuk") {
                btnMasuk.className = "flex-1 p-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all border-2 border-blue-400 shadow-lg shadow-blue-600/30 text-white";
                btnPulang.className = "flex-1 p-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-all border-2 border-transparent text-slate-300";
            } else if (status === "Pulang") {
                btnPulang.className = "flex-1 p-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold transition-all border-2 border-emerald-400 shadow-lg shadow-emerald-600/30 text-white";
                btnMasuk.className = "flex-1 p-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-all border-2 border-transparent text-slate-300";
            }
        }

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.clear(); 
            
            let idKaryawan = decodedText;
            let namaKaryawan = "-";
            
            if (decodedText.includes("http://") || decodedText.includes("https://")) {
                let bagianLink = decodedText.split('/');
                idKaryawan = bagianLink[bagianLink.length - 1] || decodedText;
                idKaryawan = idKaryawan.split('?')[0]; 
            }

            try {
                let jsonQR = JSON.parse(decodedText);
                if(jsonQR.id) idKaryawan = jsonQR.id;
                if(jsonQR.nama) namaKaryawan = jsonQR.nama;
            } catch(e) {}

            const shiftSelected = document.getElementById('shift').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.className = "mt-5 p-4 rounded-xl text-sm font-semibold bg-amber-500/20 text-amber-300 border border-amber-500/30";
            resultDiv.innerText = `Memproses data ${idKaryawan}...`;
            resultDiv.classList.remove('hidden');

            // Kirim data ke Google Sheets
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ id: idKaryawan, nama: namaKaryawan, shift: shiftSelected, status: currentStatus }),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            })
            .then(res => res.json())
            .then(resData => {
                if(resData.result === "success") {
                    resultDiv.className = "mt-5 p-4 rounded-xl text-sm font-semibold bg-emerald-500/20 text-emerald-300 border border-emerald-500/30";
                    resultDiv.innerText = `BERHASIL: ${resData.message} (${idKaryawan})`;
                } else {
                    resultDiv.className = "mt-5 p-4 rounded-xl text-sm font-semibold bg-rose-500/20 text-rose-300 border border-rose-500/30";
                    resultDiv.innerText = `GAGAL: ${resData.message}`;
                }
                setTimeout(startScanner, 3000); 
            })
            .catch(err => {
                resultDiv.className = "mt-5 p-4 rounded-xl text-sm font-semibold bg-rose-500/20 text-rose-300 border border-rose-500/30";
                resultDiv.innerText = "Terjadi gangguan jaringan ke Server.";
                setTimeout(startScanner, 3000);
            });
        }

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess);
        }

        startScanner();
    </script>
</body>
</html>
